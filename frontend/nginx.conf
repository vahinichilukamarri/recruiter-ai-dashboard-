server {
    listen 5000;

    root /usr/share/nginx/html;
    index index.html;

    # /ananya-aegis prefix
    rewrite ^/ananya-aegis/?(.*)$ /$1 last;

    # React SPA routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health endpoint
    location = /health {
        access_log off;
        return 200 "ok";
    }
}