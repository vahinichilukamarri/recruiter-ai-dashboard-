server {
    listen 5000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Strip the ingress path prefix so the app works whether the
    # ingress controller rewrites the path (rewrite-target: /) or
    # forwards it as-is to this container.
    rewrite ^/ananya-aegis-fe/?(.*)$ /$1 last;

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Proxy /ananya-aegis requests to the backend
    location /ananya-aegis/ {
        proxy_pass http://134.33.132.134/ananya-aegis/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
